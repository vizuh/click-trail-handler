name: PHP Compatibility (WP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcompat:
    name: PHPCompatibility-WP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCompatibilityWP
        run: composer run phpcompat
